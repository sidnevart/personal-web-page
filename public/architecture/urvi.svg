<svg width="720" height="380" viewBox="0 0 720 380" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9f6c3a" stroke-width="1.5"/>
    </marker>
    <marker id="arr-soft" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8a8279" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Client: Telegram WebApp -->
  <rect x="20" y="20" width="190" height="65" rx="8" fill="none" stroke="#9f6c3a" stroke-width="1.5"/>
  <text x="115" y="42" text-anchor="middle" fill="#9f6c3a" font-weight="600" font-size="11">TELEGRAM WEBAPP</text>
  <text x="115" y="58" text-anchor="middle" fill="#5c5549" font-size="10">Map · Bookings · Profile</text>
  <text x="115" y="74" text-anchor="middle" fill="#8a8279" font-size="9">Login via Telegram phone</text>

  <!-- Client: Web Browser -->
  <rect x="230" y="20" width="190" height="65" rx="8" fill="none" stroke="#9f6c3a" stroke-width="1.5"/>
  <text x="325" y="42" text-anchor="middle" fill="#9f6c3a" font-weight="600" font-size="11">WEB CLIENT</text>
  <text x="325" y="58" text-anchor="middle" fill="#5c5549" font-size="10">Next.js — same account</text>
  <text x="325" y="74" text-anchor="middle" fill="#8a8279" font-size="9">Partner office · Admin panel</text>

  <!-- Arrows down to API -->
  <line x1="115" y1="85" x2="280" y2="155" stroke="#9f6c3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="325" y1="85" x2="325" y2="155" stroke="#9f6c3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend API -->
  <rect x="160" y="155" width="330" height="65" rx="8" fill="none" stroke="#9f6c3a" stroke-width="2"/>
  <text x="325" y="177" text-anchor="middle" fill="#9f6c3a" font-weight="700" font-size="12">BACKEND API</text>
  <text x="325" y="193" text-anchor="middle" fill="#5c5549" font-size="10">Slots · Bookings · Partners · Auth</text>
  <text x="325" y="209" text-anchor="middle" fill="#8a8279" font-size="9">Go (chi · pgx) · Docker</text>

  <!-- YClients -->
  <rect x="530" y="20" width="165" height="65" rx="8" fill="none" stroke="#8a8279" stroke-width="1"/>
  <text x="612" y="42" text-anchor="middle" fill="#5c5549" font-weight="600" font-size="11">YCLIENTS API</text>
  <text x="612" y="58" text-anchor="middle" fill="#8a8279" font-size="10">Partner schedule sync</text>
  <text x="612" y="74" text-anchor="middle" fill="#8a8279" font-size="9">Slots · Availability · Booking</text>

  <!-- Arrow YClients → API -->
  <line x1="530" y1="52" x2="492" y2="165" stroke="#8a8279" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-soft)"/>

  <!-- Arrow API → DB -->
  <line x1="325" y1="220" x2="325" y2="285" stroke="#9f6c3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PostgreSQL -->
  <rect x="160" y="285" width="190" height="65" rx="8" fill="none" stroke="#8a8279" stroke-width="1"/>
  <text x="255" y="307" text-anchor="middle" fill="#5c5549" font-weight="600" font-size="11">POSTGRESQL</text>
  <text x="255" y="323" text-anchor="middle" fill="#8a8279" font-size="10">Users · Slots · Bookings</text>
  <text x="255" y="339" text-anchor="middle" fill="#8a8279" font-size="9">Partners · Discounts</text>

  <!-- Telegram Bot -->
  <rect x="370" y="285" width="165" height="65" rx="8" fill="none" stroke="#8a8279" stroke-width="1"/>
  <text x="452" y="307" text-anchor="middle" fill="#5c5549" font-weight="600" font-size="11">TELEGRAM BOT</text>
  <text x="452" y="323" text-anchor="middle" fill="#8a8279" font-size="10">Auth · Notifications</text>
  <text x="452" y="339" text-anchor="middle" fill="#8a8279" font-size="9">Booking confirmations</text>

  <!-- Arrow API → Telegram Bot -->
  <line x1="420" y1="220" x2="452" y2="285" stroke="#8a8279" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-soft)"/>
</svg>
